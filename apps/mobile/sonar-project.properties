sonar.projectKey=nexus-ai-workspace-frontend
sonar.projectName=Nexus AI Workspace Frontend
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8

sonar.sources=apps,packages,scripts
sonar.tests=apps,packages,scripts

sonar.test.inclusions=\
**/*.test.ts,\
**/*.test.tsx,\
**/*.spec.ts,\
**/*.spec.tsx,\
scripts/generators/__tests__/**

sonar.exclusions=\
**/node_modules/**,\
**/dist/**,\
**/build/**,\
**/coverage/**,\
**/.turbo/**,\
apps/mobile/android/**,\
apps/mobile/ios/**,\
tmp/**,\
**/*.d.ts

sonar.coverage.exclusions=\
scripts/generators/**,\
apps/mobile/**,\
packages/shared-types/**

sonar.javascript.lcov.reportPaths=\
apps/web/coverage/lcov.info,\
packages/shared-ui/coverage/lcov.info,\
packages/shared-utils/coverage/lcov.info,\
packages/shared-validation/coverage/lcov.info
